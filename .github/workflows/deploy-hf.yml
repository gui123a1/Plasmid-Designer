name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]
    paths:
      - 'src/backend/core/**'
      - 'src/frontend/**'
      - 'data/**'
      - 'deploy/hf-*/**'
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: 'Deployment mode'
        required: true
        default: 'gradio'
        type: choice
        options:
          - gradio
          - docker
          - both

env:
  HF_USERNAME: ${{ secrets.HF_USERNAME }}
  HF_SPACE_GRADIO: ${{ secrets.HF_SPACE_GRADIO || 'plasmid-designer' }}
  HF_SPACE_DOCKER: ${{ secrets.HF_SPACE_DOCKER || 'plasmid-designer-full' }}

jobs:
  deploy-gradio:
    if: ${{ github.event.inputs.deploy_mode == 'gradio' || github.event.inputs.deploy_mode == 'both' || (github.event_name == 'push' && !github.event.inputs.deploy_mode) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Checkout HF Space (Gradio)
        run: |
          git clone "https://${{ secrets.HF_USERNAME }}:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${{ env.HF_USERNAME }}/${{ env.HF_SPACE_GRADIO }}" hf-space-gradio

      - name: Copy Gradio deployment files
        run: |
          cd hf-space-gradio
          rm -rf backend data || true

          # Entry files
          cp ${{ github.workspace }}/deploy/hf-gradio/app.py .
          cp ${{ github.workspace }}/deploy/hf-gradio/requirements.txt .
          cp ${{ github.workspace }}/deploy/hf-gradio/README.md .

          # Backend core modules
          mkdir -p backend/core
          cp ${{ github.workspace }}/src/backend/core/__init__.py backend/core/
          cp ${{ github.workspace }}/src/backend/core/codon_optimizer.py backend/core/
          cp ${{ github.workspace }}/src/backend/core/primer_designer.py backend/core/
          cp ${{ github.workspace }}/src/backend/core/vector_library.py backend/core/
          cp ${{ github.workspace }}/src/backend/core/clone_strategy.py backend/core/
          cp ${{ github.workspace }}/src/backend/core/sequence_validator.py backend/core/
          cp ${{ github.workspace }}/src/backend/core/sequence_analysis.py backend/core/
          cp ${{ github.workspace }}/src/backend/core/export_formats.py backend/core/
          cp ${{ github.workspace }}/src/backend/core/output_generator.py backend/core/

          # Enhanced modules (strip app.config dependency)
          for mod in advanced_primer_designer.py enhanced_codon_optimizer.py external_vector_importer.py vector_data_sources.py; do
            if [ -f "${{ github.workspace }}/src/backend/core/$mod" ]; then
              sed 's/^from app\.config import.*$/# [HF] removed app.config dep/' \
                "${{ github.workspace }}/src/backend/core/$mod" \
                | sed 's/^import app\.config.*$/# [HF] removed app.config dep/' \
                > "backend/core/$mod"
            fi
          done

          echo '"""Plasmid Designer Backend (HF)"""' > backend/__init__.py

          # Data files
          cp -r ${{ github.workspace }}/data ./data

      - name: Push to HF (Gradio)
        run: |
          cd hf-space-gradio
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-deploy from GitHub: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  deploy-docker:
    if: ${{ github.event.inputs.deploy_mode == 'docker' || github.event.inputs.deploy_mode == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package.json

      - name: Build frontend
        run: |
          cd src/frontend
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Checkout HF Space (Docker)
        run: |
          git clone "https://${{ secrets.HF_USERNAME }}:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${{ env.HF_USERNAME }}/${{ env.HF_SPACE_DOCKER }}" hf-space-docker

      - name: Copy Docker deployment files
        run: |
          cd hf-space-docker
          rm -rf backend frontend data || true

          # Entry files
          cp ${{ github.workspace }}/deploy/hf-docker/Dockerfile .
          cp ${{ github.workspace }}/deploy/hf-docker/nginx.conf .
          cp ${{ github.workspace }}/deploy/hf-docker/start.sh .
          cp ${{ github.workspace }}/deploy/hf-docker/requirements.txt .
          cp ${{ github.workspace }}/deploy/hf-docker/main.py .
          cp ${{ github.workspace }}/deploy/hf-docker/README.md .
          chmod +x start.sh

          # Backend core modules
          mkdir -p backend/core
          cp ${{ github.workspace }}/src/backend/core/__init__.py backend/core/
          cp ${{ github.workspace }}/src/backend/core/codon_optimizer.py backend/core/
          cp ${{ github.workspace }}/src/backend/core/primer_designer.py backend/core/
          cp ${{ github.workspace }}/src/backend/core/vector_library.py backend/core/
          cp ${{ github.workspace }}/src/backend/core/clone_strategy.py backend/core/
          cp ${{ github.workspace }}/src/backend/core/sequence_validator.py backend/core/
          cp ${{ github.workspace }}/src/backend/core/sequence_analysis.py backend/core/
          cp ${{ github.workspace }}/src/backend/core/export_formats.py backend/core/
          cp ${{ github.workspace }}/src/backend/core/output_generator.py backend/core/

          # Enhanced modules (strip apps.config dependency)
          for mod in advanced_primer_designer.py enhanced_codon_optimizer.py external_vector_importer.py vector_data_sources.py; do
            if [ -f "${{ github.workspace }}/src/backend/core/$mod" ]; then
              sed 's/^from app\.config import.*$/# [HF] removed app.config dep/' \
                "${{ github.workspace }}/src/backend/core/$mod" \
                | sed 's/^import app\.config.*$/# [HF] removed app.config dep/' \
                > "backend/core/$mod"
            fi
          done

          echo '"""Plasmid Designer Backend (HF)"""' > backend/__init__.py

          # Frontend build output
          mkdir -p frontend/dist
          cp -r ${{ github.workspace }}/src/frontend/dist/* frontend/dist/

          # Data files
          cp -r ${{ github.workspace }}/data ./data

      - name: Push to HF (Docker)
        run: |
          cd hf-space-docker
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-deploy from GitHub: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
