# pYES2 酵母表达载体
# 来源: Invitrogen

id: pYES2
name: pYES2
source: Invitrogen
type: expression
host:
  - S.cerevisiae
antibiotic:
  - Amp
copy_number: medium
description: "酿酒酵母诱导表达载体，含 GAL1 启动子和 URA3 选择标记"
sequence: ""
tags: []
features:
  - name: GAL1_promoter
    type: promoter
    start: 1
    end: 500
    sequence: ""
    strand: "+"
    description: "半乳糖诱导型启动子"
  - name: MCS
    type: multiple_cloning_site
    start: 501
    end: 600
    sequence: ""
    strand: "+"
    description: "多克隆位点"
  - name: CYC1_terminator
    type: terminator
    start: 601
    end: 800
    sequence: ""
    strand: "+"
    description: "CYC1 终止子"
  - name: URA3
    type: gene
    start: 1000
    end: 2000
    sequence: ""
    strand: "+"
    description: "尿嘧啶合成基因，用于选择标记"
